name: Github Actions

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: treeform/setup-nim-action@v6
      - run: nimby install gltf/gltf.nimble
        working-directory: ${{ github.workspace }}/..
      - run: nim check src/gltf.nim
      - run: nim r tests/tests.nim
