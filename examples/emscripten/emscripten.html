<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta
      http-equiv="Content-Type"
      content="text/html; charset=utf-8"
    >
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    >
    <title>glTF Emscripten</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #151821;
      }

      canvas.emscripten {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        outline: none;
        background: #151821;
        cursor: grab;
      }

      canvas.emscripten:active {
        cursor: grabbing;
      }
    </style>
  </head>
  <body>
    <canvas
      class="emscripten"
      id="canvas"
      oncontextmenu="event.preventDefault()"
      tabindex="-1"
    ></canvas>
    <script>
      var Module = {
        preRun: [],
        postRun: [],
        canvas: (function() {
          var canvas = document.getElementById("canvas");
          canvas.addEventListener(
            "webglcontextlost",
            function(event) {
              console.error("WebGL context lost. Reload the page.");
              event.preventDefault();
            },
            false
          );
          return canvas;
        })(),
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
        },
        onRuntimeInitialized: function() {
          setTimeout(function() {
            console.info("WASM runtime initialized.");
          }, 0);
        }
      };
      window.onerror = function() {
        console.info("Exception thrown. See JavaScript console.");
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
